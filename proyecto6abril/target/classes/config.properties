# Configuración de la aplicación
# Idioma predeterminado de la aplicación
app.language=es

# Configuración de la base de datos CSV
csv.data.path=data/accounting.csv

# Configuración de la aplicación UI
app.title=Sistema de Gestión
app.version=1.0.0

# Validación de Personas
person.name.min.length=2
person.name.max.length=50
person.lastname.min.length=2
person.lastname.max.length=50

# Validación de Productos
product.price.max=999999999.99
product.description.uppercase=true
product.description.min.length=3
product.description.max.length=100
